name: Package Source and Dependencies for codex-relay

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'codex-relay 版本 tag（如 v0.5.4）'
        required: true
        default: 'v0.5.4'
        type: string

jobs:
  package:
    name: Package Source + Dependencies
    runs-on: ubuntu-latest

    env:
      CODEX_RELAY_VERSION: ${{ github.event.inputs.version || 'v0.5.4' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: MetaFARS/codex-relay
          ref: ${{ env.CODEX_RELAY_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Run cargo vendor
        run: |
          mkdir -p .cargo
          cargo vendor > .cargo/config.toml
          echo "✅ Vendor 完成，依赖包数量："
          ls -la vendor/ | wc -l

      - name: Clean and prepare package
        run: |
          # 删除可能变化的目录
          rm -rf target/
          rm -rf .git/
          rm -rf .github/
          rm -rf .idea/
          rm -rf .claude/
          # 删除 Python 相关文件（离线编译不需要）
          rm -rf codex_relay/  # Python 包目录，Rust 编译不需要
          rm -f pyproject.toml
          # 删除 .gitignore
          rm -f .gitignore
          # 确认当前目录内容
          ls -la

      - name: Create tarball
        run: |
          PACKAGE_NAME="codex-relay-${CODEX_RELAY_VERSION}-with-deps.tar.gz"
          # 直接打包当前目录，此时已经是干净的
          tar -czf "$PACKAGE_NAME" \
            --exclude='*.tar.gz' \
            .
          echo "📦 打包完成：$PACKAGE_NAME"
          ls -lh "$PACKAGE_NAME"

      - name: Upload packaged source with dependencies
        uses: actions/upload-artifact@v4
        with:
          name: codex-relay-${{ env.CODEX_RELAY_VERSION }}-with-deps
          path: codex-relay-${{ env.CODEX_RELAY_VERSION }}-with-deps.tar.gz
          retention-days: 30
