name: Package Source and Dependencies for codex-relay

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'codex-relay 版本 tag（如 v0.5.4）'
        required: true
        default: 'v0.5.4'
        type: string

jobs:
  package:
    name: Package Source + Dependencies
    runs-on: ubuntu-latest

    env:
      CODEX_RELAY_VERSION: ${{ github.event.inputs.version || 'v0.5.4' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: MetaFARS/codex-relay
          ref: ${{ env.CODEX_RELAY_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo vendor
        run: |
          mkdir -p .cargo
          cargo vendor > .cargo/config.toml
          echo "✅ Vendor 完成，依赖包数量："
          ls -la vendor/ | wc -l

      - name: Create source package with vendored dependencies
        run: |
          PACKAGE_NAME="codex-relay-${CODEX_RELAY_VERSION}-with-deps.tar.gz"
          # 打包整个源码目录，排除 .git 和 target（如果有）
          tar -czf "$PACKAGE_NAME" \
            --exclude='.git' \
            --exclude='target' \
            --exclude='*.tar.gz' \
            .
          echo "📦 打包完成：$PACKAGE_NAME"
          ls -lh "$PACKAGE_NAME"

      - name: Upload packaged source with dependencies
        uses: actions/upload-artifact@v4
        with:
          name: codex-relay-${{ env.CODEX_RELAY_VERSION }}-with-deps
          path: codex-relay-${{ env.CODEX_RELAY_VERSION }}-with-deps.tar.gz
          retention-days: 30
