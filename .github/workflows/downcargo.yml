name: Package Source and Dependencies for codex-relay

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'codex-relay 版本 tag（如 v0.5.4）'
        required: true
        default: 'v0.5.4'
        type: string

jobs:
  package:
    name: Package Source + Dependencies
    runs-on: ubuntu-latest

    env:
      CODEX_RELAY_VERSION: ${{ github.event.inputs.version || 'v0.5.4' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: MetaFARS/codex-relay
          ref: ${{ env.CODEX_RELAY_VERSION }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Run cargo vendor
        run: |
          mkdir -p .cargo
          cargo vendor > .cargo/config.toml
          echo "✅ Vendor 完成，依赖包数量："
          ls -la vendor/ | wc -l

      - name: Clean unnecessary files
        run: |
          rm -rf target/ .git/ .github/ .idea/ .claude/ codex_relay/ pyproject.toml .gitignore 2>/dev/null || true
          echo "📂 当前目录内容："
          pwd
          ls -la

      - name: Create tarball
        run: |
          PACKAGE_NAME="codex-relay-${CODEX_RELAY_VERSION}-with-deps.tar.gz"
          # 使用当前目录名作为打包根目录，输出到父目录
          DIR_NAME=$(basename "$PWD")
          echo "当前目录名: $DIR_NAME"
          cd ..
          tar -czf "$PACKAGE_NAME" "$DIR_NAME"
          mv "$PACKAGE_NAME" "$DIR_NAME/"
          cd "$DIR_NAME"
          echo "📦 打包完成：$PACKAGE_NAME"
          ls -lh "$PACKAGE_NAME"

      - name: Upload packaged source with dependencies
        uses: actions/upload-artifact@v4
        with:
          name: codex-relay-${{ env.CODEX_RELAY_VERSION }}-with-deps
          path: codex-relay-${{ env.CODEX_RELAY_VERSION }}-with-deps.tar.gz
          retention-days: 30
